name: QWRT-IPQ60xx-ZFXY-CRB-JD256-NSS-全自动编译

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 720

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 开启编译缓存（官方稳定版）
        uses: actions/cache@v4
        with:
          path: |
            lede/
            !lede/staging_dir/
            !lede/build_dir/
            !lede/tmp/
          key: ${{ runner.os }}-qwrt-ipq60xx-zfxy-${{ hashFiles('lede/.config') }}
          restore-keys: |
            ${{ runner.os }}-qwrt-ipq60xx-zfxy-

      - name: 强制配置网络环境
        run: |
          sudo bash -c "echo 'nameserver 223.5.5.5' > /etc/resolv.conf"
          sudo bash -c "echo 'nameserver 114.114.114.114' >> /etc/resolv.conf"
          git config --global http.version HTTP/1.1
          git config --global http.lowSpeedLimit 0
          git config --global http.lowSpeedTime 999999

      - name: 安装编译环境（已修复依赖）
        run: |
          sudo apt update
          sudo apt install -y build-essential libncurses5-dev git wget curl ccache \
            python3 python3-pip qemu-utils qemu-kvm

      - name: 拉取 Lean QSDK 源码（使用镜像源）
        run: |
          git clone --depth 1 https://github.com/coolsnowwolf/lede.git lede
          cd lede
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 下载并安装自定义插件（完全避开 GitHub 网络）
        run: |
          cd lede/package
          
          # Daed 插件
          wget -O daed.tar.gz https://github.com/vernedma/daed/archive/refs/heads/main.tar.gz
          tar -zxvf daed.tar.gz && mv daed-main daed && rm daed.tar.gz
          
          # OpenClash 插件
          wget -O openclash.tar.gz https://github.com/vernedma/openclash/archive/refs/heads/main.tar.gz
          tar -zxvf openclash.tar.gz && mv openclash-main openclash && rm openclash.tar.gz
          
          # MosDNS 插件
          wget -O mosdns.tar.gz https://github.com/vernedma/mosdns/archive/refs/heads/main.tar.gz
          tar -zxvf mosdns.tar.gz && mv mosdns-main mosdns && rm mosdns.tar.gz
          
          # MWAN3Help 插件
          wget -O mwan3help.tar.gz https://github.com/vernedma/mwan3help/archive/refs/heads/main.tar.gz
          tar -zxvf mwan3help.tar.gz && mv mwan3help-main mwan3help && rm mwan3help.tar.gz
          
          cd ..

      - name: 写入精准编译配置（IPQ60xx + NSS + 全套插件）
        run: |
          cd lede
          cat > .config << EOF
          CONFIG_TARGET_ipq60xx=y
          CONFIG_TARGET_ipq60xx_generic=y
          CONFIG_TARGET_DEVICE_ipq60xx_generic_DEVICE_zfxy_crb_jd256=y
          CONFIG_HAS_NSS_FIRMWARE=y
          CONFIG_PACKAGE_kmod-qca-nss-drv=y
          CONFIG_PACKAGE_kmod-qca-nss-ecm=y
          CONFIG_PACKAGE_kmod-qca-nss-crypto=y

          # 你要的插件
          CONFIG_PACKAGE_mwan3=y
          CONFIG_PACKAGE_mwan3help=y
          CONFIG_PACKAGE_adguardhome=y
          CONFIG_PACKAGE_daed=y
          CONFIG_PACKAGE_openclash=y
          CONFIG_PACKAGE_mosdns=y
          CONFIG_PACKAGE_qemu-kvm=y

          # 全套主题
          CONFIG_PACKAGE_luci-theme-argon=y
          CONFIG_PACKAGE_luci-theme-edge=y
          CONFIG_PACKAGE_luci-theme-opentopd=y
          CONFIG_PACKAGE_luci-theme-bootstrap=y

          # 系统基础
          CONFIG_TARGET_ROOTFS_SQUASHFS=y
          CONFIG_TARGET_ROOTFS_UBI=y
          EOF

      - name: 生成配置 & 下载依赖
        run: |
          cd lede
          make defconfig
          make download -j8

      - name: 开始编译固件
        run: |
          cd lede
          make -j$(nproc) || make -j1 V=s

      - name: 精准重命名固件（防不识别）
        run: |
          cd lede/bin/targets/ipq60xx/generic
          mv *.bin QWRT-R26.3.8-NSS-ZFXY-CRB-JD256-$(date +%Y%m%d).bin
          mv *.ubi QWRT-R26.3.8-NSS-ZFXY-CRB-JD256-$(date +%Y%m%d).ubi

      - name: 上传固件
        uses: actions/upload-artifact@v4
        with:
          name: QWRT-IPQ60xx-ZFXY-CRB-JD256
          path: lede/bin/targets/ipq60xx/generic/*
