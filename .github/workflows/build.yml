name: ZFXY-CRB-JD256-With-Daed

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential libncurses5-dev git wget curl ccache \
            python3 python3-pip qemu-utils

      - name: Clone OpenWrt source
        run: |
          git clone --depth 1 -b main-nss https://github.com/qosmio/openwrt-ipq.git openwrt
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Add custom packages (Daed + OpenClash + MosDNS + MWAN3Help)
        run: |
          cd openwrt/package
          # Daed（正确仓库 + ghproxy 加速）
          git clone --depth 1 https://mirror.ghproxy.com/https://github.com/daeuniverse/daed.git luci-app-daed
          # OpenClash
          git clone --depth 1 https://mirror.ghproxy.com/https://github.com/vernedma/openclash.git
          # MosDNS
          git clone --depth 1 https://mirror.ghproxy.com/https://github.com/sbwml/luci-app-mosdns.git
          # MWAN3Help
          git clone --depth 1 https://mirror.ghproxy.com/https://github.com/kiddin9/luci-app-mwan3help.git

      - name: Configure firmware
        run: |
          cd openwrt
          cat > .config << EOF
          CONFIG_TARGET_qualcommax=y
          CONFIG_TARGET_qualcommax_ipq60xx=y
          CONFIG_TARGET_DEVICE_qualcommax_ipq60xx_DEVICE_jdcloud_re_cs_07=y
          CONFIG_HAS_NSS_FIRMWARE=y
          CONFIG_PACKAGE_kmod-qca-nss-drv=y
          CONFIG_PACKAGE_kmod-qca-nss-ecm=y
          CONFIG_PACKAGE_kmod-qca-nss-crypto=y
          CONFIG_FW4=y
          CONFIG_PACKAGE_mwan3=y
          CONFIG_PACKAGE_mwan3help=y
          CONFIG_PACKAGE_adguardhome=y
          CONFIG_PACKAGE_luci-app-mosdns=y
          CONFIG_PACKAGE_luci-app-openclash=y
          CONFIG_PACKAGE_luci-app-daed=y
          CONFIG_PACKAGE_luci-theme-argon=y
          CONFIG_TARGET_ROOTFS_SQUASHFS=y
          CONFIG_TARGET_ROOTFS_UBI=y
          CONFIG_TARGET_ROOTFS_PARTSIZE=240
          EOF

      - name: Download packages
        run: |
          cd openwrt
          make defconfig
          make download -j8

      - name: Compile firmware
        run: |
          cd openwrt
          make -j$(nproc) || make -j1 V=s

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: Firmware
          path: openwrt/bin/targets/qualcommax/ipq60xx/
