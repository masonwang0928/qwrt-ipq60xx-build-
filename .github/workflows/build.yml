name: QWRT-IPQ60xx-Qosmio-NSS-全自动编译

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 720

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 开启编译缓存
        uses: actions/cache@v4
        with:
          path: |
            openwrt/
            !openwrt/staging_dir/
            !openwrt/build_dir/
            !openwrt/tmp/
          key: ${{ runner.os }}-qosmio-ipq60xx-${{ hashFiles('openwrt/.config') }}
          restore-keys: |
            ${{ runner.os }}-qosmio-ipq60xx-

      - name: 配置网络环境
        run: |
          sudo bash -c "echo 'nameserver 223.5.5.5' > /etc/resolv.conf"
          sudo bash -c "echo 'nameserver 114.114.114.114' >> /etc/resolv.conf"
          git config --global http.version HTTP/1.1

      - name: 安装编译依赖
        run: |
          sudo apt update
          sudo apt install -y build-essential libncurses5-dev git wget curl ccache python3 python3-pip qemu-utils

      - name: 拉取 qosmio 官方源码 (main-nss 分支)
        run: |
          git clone -b main-nss --depth 1 https://github.com/qosmio/openwrt-ipq.git openwrt
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 安装自定义插件 (稳定源)
        run: |
          cd openwrt/package
          
          # OpenClash
          git clone --depth 1 https://github.com/vernedma/openclash.git
          
          # MosDNS
          git clone --depth 1 https://github.com/sbwml/luci-app-mosdns.git
          
          # MWAN3Help
          git clone --depth 1 https://github.com/kiddin9/luci-app-mwan3help.git
          
          # Daed (恢复你要的插件，使用官方稳定仓库)
          git clone --depth 1 https://github.com/daedre/daed.git
          
          cd ..

      - name: 写入精准编译配置 (IPQ60xx + NSS + 全套插件)
        run: |
          cd openwrt
          cat > .config << EOF
          # 平台配置
          CONFIG_TARGET_ipq60xx=y
          CONFIG_TARGET_ipq60xx_generic=y
          CONFIG_TARGET_DEVICE_ipq60xx_generic_DEVICE_jdcloud_re_cs_07=y
          
          # NSS 硬件加速 (满血)
          CONFIG_HAS_NSS_FIRMWARE=y
          CONFIG_PACKAGE_kmod-qca-nss-drv=y
          CONFIG_PACKAGE_kmod-qca-nss-ecm=y
          CONFIG_PACKAGE_kmod-qca-nss-crypto=y
          CONFIG_PACKAGE_kmod-qca-nss-pppoe=y
          
          # 你要的插件
          CONFIG_PACKAGE_mwan3=y
          CONFIG_PACKAGE_mwan3help=y
          CONFIG_PACKAGE_adguardhome=y
          CONFIG_PACKAGE_daed=y
          CONFIG_PACKAGE_openclash=y
          CONFIG_PACKAGE_mosdns=y
          
          # 主题全套
          CONFIG_PACKAGE_luci-theme-argon=y
          CONFIG_PACKAGE_luci-theme-bootstrap=y
          CONFIG_PACKAGE_luci-theme-edge=y
          
          # 系统配置
          CONFIG_TARGET_ROOTFS_SQUASHFS=y
          CONFIG_TARGET_ROOTFS_UBI=y
          CONFIG_FW4=y
          EOF

      - name: 生成配置 & 下载依赖
        run: |
          cd openwrt
          make defconfig
          make download -j8

      - name: 开始编译固件
        run: |
          cd openwrt
          make -j$(nproc) || make -j1 V=s

      - name: 精准重命名固件
        run: |
          cd openwrt/bin/targets/ipq60xx/generic
          mv *.bin QWRT-Qosmio-NSS-ZFXY-CRB-JD256-$(date +%Y%m%d).bin
          mv *.ubi QWRT-Qosmio-NSS-ZFXY-CRB-JD256-$(date +%Y%m%d).ubi

      - name: 上传固件
        uses: actions/upload-artifact@v4
        with:
          name: QWRT-IPQ60xx-Qosmio-Firmware
          path: openwrt/bin/targets/ipq60xx/generic/*
