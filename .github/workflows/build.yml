name: QWRT-IPQ60xx-ZFXY-CRB-JD256-NSS-全自动编译

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 720

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 开启编译缓存（官方稳定版）
        uses: actions/cache@v4
        with:
          path: |
            lede/
            !lede/staging_dir/
            !lede/build_dir/
            !lede/tmp/
          key: ${{ runner.os }}-qwrt-ipq60xx-zfxy-${{ hashFiles('lede/.config') }}
          restore-keys: |
            ${{ runner.os }}-qwrt-ipq60xx-zfxy-

      - name: 强制配置网络环境
        run: |
          sudo bash -c "echo 'nameserver 223.5.5.5' > /etc/resolv.conf"
          sudo bash -c "echo 'nameserver 114.114.114.114' >> /etc/resolv.conf"
          git config --global http.version HTTP/1.1
          git config --global http.lowSpeedLimit 0
          git config --global http.lowSpeedTime 999999

      - name: 安装编译环境
        run: |
          sudo apt update
          sudo apt install -y build-essential libncurses5-dev git wget curl ccache \
            python3 python3-pip qemu-utils qemu-kvm

      - name: 拉取 Lean QSDK 源码
        run: |
          git clone --depth 1 https://github.com/coolsnowwolf/lede.git lede
          cd lede
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 下载并安装稳定版插件（公开仓库）
        run: |
          cd lede/package
          
          # 1. OpenClash (稳定公开仓库)
          git clone --depth 1 https://github.com/vernedma/luci-app-openclash.git openclash
          
          # 2. MosDNS (官方维护仓库)
          git clone --depth 1 https://github.com/sbwml/luci-app-mosdns.git mosdns
          
          # 3. MWAN3Help (稳定公开仓库)
          git clone --depth 1 https://github.com/kiddin9/luci-app-mwan3help.git mwan3help
          
          # 4. Daed (替换为其他可用代理插件，如 PassWall，若必须要 Daed 请手动下载)
          # 由于 vernedma/daed 仓库已 404，这里替换为 PassWall 作为备选
          git clone --depth 1 https://github.com/xiaorouji/openwrt-passwall.git passwall
          
          cd ..

      - name: 写入精准编译配置（IPQ60xx + NSS + 全套插件）
        run: |
          cd lede
          cat > .config << EOF
          CONFIG_TARGET_ipq60xx=y
          CONFIG_TARGET_ipq60xx_generic=y
          CONFIG_TARGET_DEVICE_ipq60xx_generic_DEVICE_zfxy_crb_jd256=y
          CONFIG_HAS_NSS_FIRMWARE=y
          CONFIG_PACKAGE_kmod-qca-nss-drv=y
          CONFIG_PACKAGE_kmod-qca-nss-ecm=y
          CONFIG_PACKAGE_kmod-qca-nss-crypto=y

          # 网络插件
          CONFIG_PACKAGE_mwan3=y
          CONFIG_PACKAGE_mwan3help=y
          CONFIG_PACKAGE_adguardhome=y
          CONFIG_PACKAGE_luci-app-mosdns=y
          CONFIG_PACKAGE_luci-app-openclash=y
          CONFIG_PACKAGE_luci-app-passwall=y
          CONFIG_PACKAGE_qemu-kvm=y

          # 全套主题
          CONFIG_PACKAGE_luci-theme-argon=y
          CONFIG_PACKAGE_luci-theme-edge=y
          CONFIG_PACKAGE_luci-theme-opentopd=y
          CONFIG_PACKAGE_luci-theme-bootstrap=y

          # 系统基础
          CONFIG_TARGET_ROOTFS_SQUASHFS=y
          CONFIG_TARGET_ROOTFS_UBI=y
          EOF

      - name: 生成配置 & 下载依赖
        run: |
          cd lede
          make defconfig
          make download -j8

      - name: 开始编译固件
        run: |
          cd lede
          make -j$(nproc) || make -j1 V=s

      - name: 精准重命名固件（防不识别）
        run: |
          cd lede/bin/targets/ipq60xx/generic
          mv *.bin QWRT-R26.3.8-NSS-ZFXY-CRB-JD256-$(date +%Y%m%d).bin
          mv *.ubi QWRT-R26.3.8-NSS-ZFXY-CRB-JD256-$(date +%Y%m%d).ubi

      - name: 上传固件
        uses: actions/upload-artifact@v4
        with:
          name: QWRT-IPQ60xx-ZFXY-CRB-JD256
          path: lede/bin/targets/ipq60xx/generic/*
